name: Docker build

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name, relative to ghcr.io/<owner>/<repo>/ (e.g. "backend")
        required: true
        type: string
      context:
        description: Build context directory
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build ${{ inputs.image-name }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set image name (lowercase)
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.image-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
